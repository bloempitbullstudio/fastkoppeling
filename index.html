<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Snelkoppelingen</title>
<style>
  :root{
    --bg:#0b1020;
    --panel:#0f172a;
    --text:#e5edf7;
    --muted:#93a4b8;
    --primary:#60a5fa;
    --primary2:#22d3ee;
    --border:#1f2a3c;
    --btn:#1b2942;
    --btnHover:#203150;
    --shadow: 0 10px 30px rgba(0,0,0,.25);
  }
  [data-theme="light"]{
    --bg:#f3f6fb;
    --panel:#ffffff;
    --text:#0f172a;
    --muted:#5b6b7d;
    --primary:#2563eb;
    --primary2:#06b6d4;
    --border:#e5eef7;
    --btn:#f4f7fb;
    --btnHover:#eaf0f8;
    --shadow: 0 10px 28px rgba(0,0,0,.08);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
    color:var(--text);
    background:
      radial-gradient(900px 600px at 15% 0%, rgba(96,165,250,.15), transparent 60%),
      radial-gradient(800px 500px at 85% 20%, rgba(34,211,238,.12), transparent 60%),
      var(--bg);
    display:flex; align-items:center; justify-content:center; padding:24px;
  }

  .wrap{
    width:min(1000px, 100%);
    background: color-mix(in srgb, var(--panel) 95%, transparent);
    border:1px solid var(--border);
    border-radius:18px;
    padding:28px;
    box-shadow: var(--shadow);
  }

  header{
    display:flex; align-items:center; gap:12px; margin-bottom:18px;
  }
  header h1{ margin:0; font-size:1.25rem; letter-spacing:.2px }
  header .spacer{flex:1}
  .theme-btn{
    border:1px solid var(--border);
    background:linear-gradient(180deg, var(--btn), color-mix(in srgb, var(--btn) 80%, #000 0%));
    color:var(--text); padding:.55rem .8rem; border-radius:10px; cursor:pointer;
    transition:.2s transform,.2s background,.2s border-color;
  }
  .theme-btn:hover{ transform:translateY(-1px); border-color: color-mix(in srgb, var(--primary) 40%, var(--border)) }

  .grid{
    display:grid; gap:16px;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  }

  /* ECHTE KNOPPEN */
  .tile{
    position:relative;
    display:flex; align-items:center; gap:12px;
    padding:18px 18px;
    border:1px solid var(--border);
    border-radius:14px;
    color:var(--text);
    background:
      linear-gradient(135deg, color-mix(in srgb, var(--btn) 85%, transparent), color-mix(in srgb, var(--btn) 70%, transparent));
    transition: .22s transform, .22s border-color, .22s box-shadow, .22s background, .22s filter;
    box-shadow: var(--shadow);
    outline: none;
    width:100%;
    text-align:left;
    cursor:pointer;
  }
  .tile:hover{ transform: translateY(-3px); border-color: color-mix(in srgb, var(--primary) 40%, var(--border)) }
  .tile:focus-visible{ box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 50%, transparent) }
  .tile:active{ filter:brightness(.97); transform:translateY(-1px); }

  .tile .icon{
    width:44px; height:44px; border-radius:12px;
    display:grid; place-items:center; flex:0 0 auto;
    background: linear-gradient(135deg, var(--primary), var(--primary2));
    color:white; font-size:22px;
    box-shadow: 0 6px 18px rgba(37, 99, 235, .35);
  }
  .tile .text{ display:flex; flex-direction:column }
  .tile .title{ font-weight:600; letter-spacing:.2px }
  .tile .desc{ font-size:.9rem; color:var(--muted); margin-top:2px }
  .tile .chev{
    margin-left:auto; color:var(--muted);
    transition:.2s transform, .2s color; font-size:20px;
  }
  .tile:hover .chev{ transform: translateX(3px); color:var(--primary) }

  footer{
    margin-top:16px; color:var(--muted); font-size:.9rem; text-align:center;
  }
</style>
</head>
<body data-theme="dark">

		<button class="tile" type="button" data-url="https://floorplanner.com/home" aria-label="Open floorplanner :) (nieuw tabblad">

    <footer>© Matteo Designs 2025-2026 — Snelkoppelingen</footer>
  </div>

<script>
  // Thema wisselen
  document.getElementById("theme").addEventListener("click", () => {
    document.body.dataset.theme =
      document.body.dataset.theme === "dark" ? "light" : "dark";
  });

  // Alle knoppen laten openen in nieuw tabblad
  document.querySelectorAll(".tile[data-url]").forEach(btn => {
    btn.addEventListener("click", () => {
      const url = btn.getAttribute("data-url");
      if (url) window.open(url, "_blank", "noopener");
    });

    // Enter/Space zijn automatisch ondersteund voor <button>,
    // dus geen extra keyboard handlers nodig.
  });
</script>
</body>
</html>
